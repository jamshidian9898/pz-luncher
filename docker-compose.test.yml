# PZ Platform — Backend + Monitoring Stack
#
# Services:
#   backend    → http://localhost:8080
#   prometheus → http://localhost:9090
#   grafana    → http://localhost:3000 (admin/changeme)
#   loki       → http://localhost:3100
#   promtail   → ships container logs to Loki
#
# Usage (backend only):
#   make test-stack
#
# Usage (backend + fake agents):
#   make test-stack-full
#
# Launcher runs native on host → connect to http://localhost:8080

services:

  # ── Backend ──
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: pz-backend:test
    container_name: pz-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/data
    command:
      - -addr=:8080
      - -registry=/app/registry.json
      - -store=/data/store
      - -fixtures=/app/fixtures
      - -no-auth
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/servers"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    labels:
      - "logging=promtail"
    networks:
      - pz-net

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: pz-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    networks:
      - pz-net

  # ── Loki (log aggregation) ──
  loki:
    image: grafana/loki:3.0.0
    container_name: pz-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - pz-net

  # ── Promtail (ships Docker logs → Loki) ──
  promtail:
    image: grafana/promtail:3.0.0
    container_name: pz-promtail
    restart: unless-stopped
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - pz-net

  # ── Grafana (dashboards + logs) ──
  grafana:
    image: grafana/grafana:11.0.0
    container_name: pz-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
      - loki
    networks:
      - pz-net

volumes:
  backend-data:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  pz-net:
    driver: bridge
