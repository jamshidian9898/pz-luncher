name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. beta-1)'
        required: true
        default: 'beta-1'

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/launcher-ui/frontend/package-lock.json
      - name: Build
        working-directory: apps/launcher-ui/frontend
        run: npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/launcher-ui/frontend/dist/

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/launcher-ui/frontend/dist/
      - name: Build arm64
        run: |
          cd apps/launcher-ui
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-s -w" -o ../../dist/pz-launcher-mac-arm64 .
      - name: Build amd64
        run: |
          cd apps/launcher-ui
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -ldflags="-s -w" -o ../../dist/pz-launcher-mac-amd64 .
      - name: Universal binary
        run: |
          mkdir -p dist
          lipo -create dist/pz-launcher-mac-arm64 dist/pz-launcher-mac-amd64 \
            -output dist/pz-launcher-mac-universal
      - uses: actions/upload-artifact@v4
        with:
          name: mac-binaries
          path: dist/pz-launcher-mac-*

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/launcher-ui/frontend/dist/
      - name: Build
        run: |
          cd apps/launcher-ui
          $env:CGO_ENABLED = "1"
          go build -ldflags="-s -w -H windowsgui" -o ../../dist/pz-launcher-windows-amd64.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/pz-launcher-windows-amd64.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install webkit2gtk
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/launcher-ui/frontend/dist/
      - name: Build
        run: |
          cd apps/launcher-ui
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o ../../dist/pz-launcher-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/pz-launcher-linux-amd64

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows, build-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PZ Launcher ${{ github.ref_name }}"
          body: |
            ## Beta Release

            ### Install
            - **macOS**: Download `pz-launcher-mac-universal`, `chmod +x`, run
            - **Windows**: Download `pz-launcher-windows-amd64.exe`, run
            - **Linux**: Download `pz-launcher-linux-amd64`, `chmod +x`, run

            ### First Run
            1. Open the launcher
            2. Go to **Settings → Health Check** and run checks
            3. Set your game path if needed
            4. Browse servers and hit **Join**

            ### Reporting Bugs
            Settings → Health Check → **Copy Diagnostics** → paste in Discord
          files: |
            artifacts/mac-binaries/*
            artifacts/windows-binary/*
            artifacts/linux-binary/*
          draft: true
          prerelease: true
