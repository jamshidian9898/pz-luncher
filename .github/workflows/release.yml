name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. beta-1)'
        required: true
        default: 'beta-1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Node 22 LTS runs on Node.js 24 actions runtime
          cache: 'npm'
          cache-dependency-path: apps/launcher-ui/frontend/package-lock.json
      - name: Build
        working-directory: apps/launcher-ui/frontend
        run: npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/launcher-ui/frontend/dist/

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build arm64
        working-directory: apps/launcher-ui
        run: wails build -platform darwin/arm64 -ldflags "-s -w"
      - name: Build amd64
        working-directory: apps/launcher-ui
        run: wails build -platform darwin/amd64 -ldflags "-s -w"
      - name: Create universal .dmg
        run: |
          # Merge arm64 + amd64 binaries inside the .app
          ARM="apps/launcher-ui/build/bin/PZ Launcher.app/Contents/MacOS/PZ Launcher"
          AMD="apps/launcher-ui/build/bin/PZ Launcher-amd64.app/Contents/MacOS/PZ Launcher"

          APP="dist/PZ Launcher.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          # Use arm64 app as base, create universal binary
          cp -R "apps/launcher-ui/build/bin/PZ Launcher.app/" "$APP/"
          lipo -create \
            "apps/launcher-ui/build/bin/PZ Launcher.app/Contents/MacOS/PZ Launcher" \
            "apps/launcher-ui/build/bin/PZ Launcher-amd64.app/Contents/MacOS/PZ Launcher" \
            -output "$APP/Contents/MacOS/PZ Launcher" 2>/dev/null || true

          # Create .dmg
          hdiutil create -volname "PZ Launcher" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "dist/PZ-Launcher-mac.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-binaries
          path: dist/PZ-Launcher-mac.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install GCC (TDM-GCC via Chocolatey)
        run: choco install mingw -y
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build
        working-directory: apps/launcher-ui
        run: wails build -platform windows/amd64 -ldflags "-s -w"
      - name: Move artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "apps/launcher-ui/build/bin/PZ Launcher.exe" "dist/pz-launcher-windows-amd64.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/pz-launcher-windows-amd64.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build
        working-directory: apps/launcher-ui
        run: wails build -platform linux/amd64 -ldflags "-s -w"
      - name: Move artifact
        run: |
          mkdir -p dist
          cp "apps/launcher-ui/build/bin/PZ Launcher" dist/pz-launcher-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/pz-launcher-linux-amd64

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows, build-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PZ Launcher ${{ github.ref_name }}"
          body: |
            ## Beta Release

            ### Install
            - **macOS**: Download `PZ-Launcher-mac.dmg`, open, drag to Applications
            - **Windows**: Download `pz-launcher-windows-amd64.exe`, run
            - **Linux**: Download `pz-launcher-linux-amd64`, `chmod +x`, run

            ### First Run
            1. Open the launcher
            2. Go to **Settings → Health Check** and run checks
            3. Set your game path if needed
            4. Browse servers and hit **Join**

            ### Reporting Bugs
            Settings → Health Check → **Copy Diagnostics** → paste in Discord
          files: |
            artifacts/mac-binaries/*
            artifacts/windows-binary/*
            artifacts/linux-binary/*
          draft: true
          prerelease: true
