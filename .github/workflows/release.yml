name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.0-beta)'
        required: true
        default: 'v2.0.0-beta'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: ${{ github.ref_name || inputs.version }}

jobs:
  # ────────────────────────────────────────────────
  # 1. Server binaries: backend + agent (linux only)
  # ────────────────────────────────────────────────
  build-server:
    name: Build Server Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build all binaries (parallel)
        run: |
          set -e
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
            -o dist/pz-backend-linux-amd64 ./apps/backend/cmd/backend &
          pid1=$!
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
            -o dist/pz-backend-linux-arm64 ./apps/backend/cmd/backend &
          pid2=$!
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
            -o dist/pz-agent-linux-amd64 ./apps/pz-agent/cmd/agent &
          pid3=$!
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
            -o dist/pz-agent-linux-arm64 ./apps/pz-agent/cmd/agent &
          pid4=$!
          wait $pid1 $pid2 $pid3 $pid4

      - name: Verify build outputs
        run: ls -la dist/

      - name: Copy install script
        run: cp deploy/install-agent.sh dist/install-agent.sh

      - uses: actions/upload-artifact@v4
        with:
          name: server-binaries
          path: dist/

  # ────────────────────────────────────────────────
  # 2. Docker: backend + agent → DockerHub
  # ────────────────────────────────────────────────
  build-docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    environment: docker hub
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pz-backend:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pz-backend:latest

      - name: Build & push agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/pz-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pz-agent:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pz-agent:latest

  # ────────────────────────────────────────────────
  # 3. Launcher: macOS, Windows, Linux
  # ────────────────────────────────────────────────
  build-frontend:
    name: Build Launcher Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/launcher-ui/frontend/package-lock.json
      - name: Build
        working-directory: apps/launcher-ui/frontend
        run: npm ci && npm run build
      - name: Verify wailsjs runtime exists
        run: |
          if [ ! -f "apps/launcher-ui/frontend/src/wailsjs/runtime/runtime.js" ]; then
            echo "ERROR: wailsjs/runtime/runtime.js missing"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/launcher-ui/frontend/dist/

  build-mac:
    name: Build macOS Launcher
    runs-on: macos-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build arm64
        working-directory: apps/launcher-ui
        run: wails build -platform darwin/arm64 -ldflags "-s -w"
      - name: Build amd64
        working-directory: apps/launcher-ui
        run: wails build -platform darwin/amd64 -ldflags "-s -w"
      - name: Create universal .dmg
        run: |
          APP="dist/PZ Launcher.app"
          mkdir -p dist
          cp -R "apps/launcher-ui/build/bin/PZ Launcher.app/" "$APP/"
          lipo -create \
            "apps/launcher-ui/build/bin/PZ Launcher.app/Contents/MacOS/PZ Launcher" \
            "apps/launcher-ui/build/bin/PZ Launcher-amd64.app/Contents/MacOS/PZ Launcher" \
            -output "$APP/Contents/MacOS/PZ Launcher" 2>/dev/null || true
          hdiutil create -volname "PZ Launcher" \
            -srcfolder "$APP" -ov -format UDZO \
            "dist/PZ-Launcher-mac.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-binaries
          path: dist/PZ-Launcher-mac.dmg

  build-windows:
    name: Build Windows Launcher
    runs-on: windows-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Add MinGW to PATH (pre-installed via MSYS2)
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build
        working-directory: apps/launcher-ui
        run: wails build -platform windows/amd64 -ldflags "-s -w"
      - name: Move artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "apps/launcher-ui/build/bin/PZ Launcher.exe" "dist/pz-launcher-windows-amd64.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/pz-launcher-windows-amd64.exe

  build-linux-launcher:
    name: Build Linux Launcher
    runs-on: ubuntu-22.04
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build
        working-directory: apps/launcher-ui
        run: wails build -platform linux/amd64 -ldflags "-s -w"
      - name: Move artifact
        run: |
          mkdir -p dist
          cp "apps/launcher-ui/build/bin/PZ Launcher" dist/pz-launcher-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/pz-launcher-linux-amd64

  # ────────────────────────────────────────────────
  # 4. GitHub Release — attach everything
  # ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-server, build-mac, build-windows, build-linux-launcher]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: server-binaries
          path: artifacts/server-binaries/
      - uses: actions/download-artifact@v4
        with:
          name: mac-binaries
          path: artifacts/mac-binaries/
      - uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: artifacts/windows-binary/
      - uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: artifacts/linux-binary/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PZ Platform ${{ env.VERSION }}"
          body: |
            ## PZ Platform ${{ env.VERSION }}

            ### Backend (Linux Server)
            ```bash
            # amd64
            wget https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/pz-backend-linux-amd64
            chmod +x pz-backend-linux-amd64
            ./pz-backend-linux-amd64 -addr :8080 -no-auth

            # arm64
            wget https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/pz-backend-linux-arm64
            ```

            ### Agent (Linux Server)
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/pz-agent-linux-amd64
            chmod +x pz-agent-linux-amd64
            ./pz-agent-linux-amd64 -server YOUR_SERVER_ID -backend http://BACKEND_IP:8080 -mods /srv/pz-mods
            ```

            ### Agent Auto-Installer
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/install-agent.sh | \
              PZ_BACKEND=http://BACKEND_IP:8080 PZ_SERVER=my-server sh
            ```

            ### Docker
            ```bash
            # Backend
            docker run -d -p 8080:8080 -v pz-data:/data \
              ${{ secrets.DOCKERHUB_USERNAME }}/pz-backend:${{ env.VERSION }}

            # Full stack (Backend + Prometheus + Grafana)
            docker compose -f docker-compose.yml -f docker-compose.ops.yml up -d
            ```

            ### Launcher (Windows / macOS / Linux)
            - **Windows**: `pz-launcher-windows-amd64.exe`
            - **macOS**: `PZ-Launcher-mac.dmg`
            - **Linux**: `pz-launcher-linux-amd64`
          files: |
            artifacts/server-binaries/*
            artifacts/mac-binaries/*
            artifacts/windows-binary/*
            artifacts/linux-binary/*
          draft: false
          prerelease: ${{ contains(env.VERSION, 'alpha') || contains(env.VERSION, 'beta') }}
          make_latest: ${{ !contains(env.VERSION, 'alpha') && !contains(env.VERSION, 'beta') }}
          fail_on_unmatched_files: true
          overwrite: true
