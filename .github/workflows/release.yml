name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. beta-1)'
        required: true
        default: 'beta-1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Node 22 LTS runs on Node.js 24 actions runtime
          cache: 'npm'
          cache-dependency-path: apps/launcher-ui/frontend/package-lock.json
      - name: Build
        working-directory: apps/launcher-ui/frontend
        run: npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/launcher-ui/frontend/dist/

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/launcher-ui/frontend/dist/
      - name: Build arm64
        run: |
          cd apps/launcher-ui
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -tags desktop -ldflags="-s -w" -o ../../dist/pz-launcher-arm64 .
      - name: Build amd64
        run: |
          cd apps/launcher-ui
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -tags desktop -ldflags="-s -w" -o ../../dist/pz-launcher-amd64 .
      - name: Create universal .app bundle
        run: |
          mkdir -p dist
          # Universal binary
          lipo -create dist/pz-launcher-arm64 dist/pz-launcher-amd64 \
            -output dist/pz-launcher-universal

          # .app bundle structure
          APP="dist/PZ Launcher.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp dist/pz-launcher-universal "$APP/Contents/MacOS/PZ Launcher"
          chmod +x "$APP/Contents/MacOS/PZ Launcher"

          # Info.plist
          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>PZ Launcher</string>
            <key>CFBundleDisplayName</key><string>PZ Launcher</string>
            <key>CFBundleIdentifier</key><string>com.pzlauncher.app</string>
            <key>CFBundleVersion</key><string>1.0.0</string>
            <key>CFBundleShortVersionString</key><string>1.0.0-beta</string>
            <key>CFBundleExecutable</key><string>PZ Launcher</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
          </dict>
          </plist>
          EOF

          # Create .dmg
          hdiutil create -volname "PZ Launcher" \
            -srcfolder "dist/PZ Launcher.app" \
            -ov -format UDZO \
            "dist/PZ-Launcher-mac.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-binaries
          path: dist/PZ-Launcher-mac.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/launcher-ui/frontend/dist/
      - name: Build
        run: |
          cd apps/launcher-ui
          $env:CGO_ENABLED = "1"
          go build -tags desktop -ldflags="-s -w -H windowsgui" -o ../../dist/pz-launcher-windows-amd64.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/pz-launcher-windows-amd64.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install webkit2gtk
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/launcher-ui/frontend/dist/
      - name: Build
        run: |
          cd apps/launcher-ui
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -tags desktop -ldflags="-s -w" -o ../../dist/pz-launcher-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/pz-launcher-linux-amd64

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows, build-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PZ Launcher ${{ github.ref_name }}"
          body: |
            ## Beta Release

            ### Install
            - **macOS**: Download `PZ-Launcher-mac.dmg`, open, drag to Applications
            - **Windows**: Download `pz-launcher-windows-amd64.exe`, run
            - **Linux**: Download `pz-launcher-linux-amd64`, `chmod +x`, run

            ### First Run
            1. Open the launcher
            2. Go to **Settings → Health Check** and run checks
            3. Set your game path if needed
            4. Browse servers and hit **Join**

            ### Reporting Bugs
            Settings → Health Check → **Copy Diagnostics** → paste in Discord
          files: |
            artifacts/mac-binaries/*
            artifacts/windows-binary/*
            artifacts/linux-binary/*
          draft: true
          prerelease: true
